name: CI

on:
  pull_request:
  push:
    branches-ignore:
      - main

permissions:
  contents: read

# JavaScript actions (actions/checkout, actions/setup-node, pnpm/action-setup) を
# Node.js 24 ランタイムで起動させる。Node 20 ランタイムは 2026-09-16 にランナーから削除される。
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 単一の "check" ジョブで pnpm check を実行する。
  # pnpm check は内部で secretlint + typecheck + lint + format + build + test を直列実行する。
  # secretlint は Node-native のため未インストール抜けが構造的に起きない。
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - run: pnpm check

  # gitleaks は二重防衛のための追加レイヤ (より広範なシークレットルール)。
  # secretlint で既に主要パターンはブロック済みだが、CIでは念のため両方実行する。
  secrets-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  bench:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - name: Run kizami perf benchmark (absolute-value gates)
        run: pnpm bench

  commitlint:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v4
        with:
          version: 11.5.2

      - uses: actions/setup-node@v4
        with:
          node-version: 24.14.1
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Validate PR commits with commitlint
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          pnpm exec commitlint \
            --from "$BASE_SHA" \
            --to "$HEAD_SHA" \
            --verbose
